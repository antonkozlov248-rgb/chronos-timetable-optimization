<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Chronos Demo</title>
</head>
<body>

<script>
function startOptimization() {
    fetch('/api/optimize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
    })
    .then(response => response.json())
    .then(data => console.log(data))
    .catch(error => alert('Ошибка соединения: ' + error.message));
}

function saveEditorChanges() {
    fetch('/api/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
    });
}

function exportExcel() {
    fetch('/api/export/xlsx')
        .then(r => r.blob())
        .then(blob => download(blob, 'schedule.xlsx'));
}

function exportPDF() {
    fetch('/api/export/pdf')
        .then(r => r.blob())
        .then(blob => download(blob, 'schedule.pdf'));
}

function exportJSON() {
    fetch('/api/export/json')
        .then(r => r.blob())
        .then(blob => download(blob, 'schedule.json'));
}

function download(blob, filename) {
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
}
</script>

</body>
</html>
